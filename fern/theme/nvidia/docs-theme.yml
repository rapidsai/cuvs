# NVIDIA Fern theme config — merge into your docs.yml
# Replace <projname>, <ProductName>, and <github-url> with your values.

instances:
  - url: https://<projname>.docs.buildwithfern.com/<projname>

title: NVIDIA <ProductName>

footer: ./components/CustomFooter.tsx

layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

colors:
  accentPrimary:
    dark: "#76B900"
    light: "#76B900"
  background:
    light: "#FFFFFF"
    dark: "#000000"

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: ./assets/NVIDIA_dark.svg
  light: ./assets/NVIDIA_light.svg
  height: 20
  href: /
  right-text: <ProductName>

favicon: ./assets/NVIDIA_symbol.svg

# NVIDIA Adobe Launch (docs.nvidia.com analytics; matches NeMo Curator and other Fern docs)
js:
  - url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
    strategy: beforeInteractive

css:
  - ./main.css

navbar-links:
  - type: github
    value: <github-url>

experimental:
  mdx-components:
    - ./components
