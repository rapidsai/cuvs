<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">Example Pareto curve for vector search tuning</title>
  <desc id="desc">A scatter plot of vector search tuning runs. Green points on the lower-right frontier are Pareto choices because no other run has both higher search quality and lower latency. Gray points are dominated by better choices.</desc>
  <defs>
    <marker id="axis-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4d4d4d" />
    </marker>
    <style>
      .title { font: 700 20px Arial, sans-serif; fill: #111111; }
      .subtitle { font: 14px Arial, sans-serif; fill: #444444; }
      .axis { stroke: #4d4d4d; stroke-width: 1.8; fill: none; marker-end: url(#axis-arrow); }
      .grid { stroke: #dddddd; stroke-width: 1; }
      .label { font: 600 14px Arial, sans-serif; fill: #222222; }
      .small { font: 13px Arial, sans-serif; fill: #444444; }
      .frontier { fill: none; stroke: #76b900; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .pareto { fill: #76b900; stroke: #2d4f00; stroke-width: 1.3; }
      .dominated { fill: #cfcfcf; stroke: #777777; stroke-width: 1.1; }
      .note { fill: #f3fae8; stroke: #76b900; stroke-width: 1.6; }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="430" fill="#ffffff" />
  <text class="title" x="34" y="38">Pareto curve example</text>
  <text class="subtitle" x="34" y="62">Each point is one vector search tuning run. Better runs move right and down.</text>

  <line class="grid" x1="110" y1="95" x2="760" y2="95" />
  <line class="grid" x1="110" y1="160" x2="760" y2="160" />
  <line class="grid" x1="110" y1="225" x2="760" y2="225" />
  <line class="grid" x1="110" y1="290" x2="760" y2="290" />
  <line class="grid" x1="240" y1="80" x2="240" y2="315" />
  <line class="grid" x1="370" y1="80" x2="370" y2="315" />
  <line class="grid" x1="500" y1="80" x2="500" y2="315" />
  <line class="grid" x1="630" y1="80" x2="630" y2="315" />

  <path class="axis" d="M110 315 L780 315" />
  <path class="axis" d="M110 315 L110 65" />
  <text class="label" x="344" y="366">Search quality / recall</text>
  <text class="small" x="628" y="344">higher is better</text>
  <text class="label" x="-242" y="48" transform="rotate(-90)">Search latency</text>
  <text class="small" x="88" y="196" transform="rotate(-90 88 196)">lower is better</text>

  <circle class="dominated" cx="210" cy="88" r="7" />
  <circle class="dominated" cx="265" cy="105" r="7" />
  <circle class="dominated" cx="330" cy="138" r="7" />
  <circle class="dominated" cx="410" cy="165" r="7" />
  <circle class="dominated" cx="475" cy="198" r="7" />
  <circle class="dominated" cx="545" cy="205" r="7" />
  <circle class="dominated" cx="610" cy="235" r="7" />
  <circle class="dominated" cx="690" cy="270" r="7" />

  <path class="frontier" d="M180 92 L278 132 L382 178 L502 218 L640 250 L724 292" />
  <circle class="pareto" cx="180" cy="92" r="8" />
  <circle class="pareto" cx="278" cy="132" r="8" />
  <circle class="pareto" cx="382" cy="178" r="8" />
  <circle class="pareto" cx="502" cy="218" r="8" />
  <circle class="pareto" cx="640" cy="250" r="8" />
  <circle class="pareto" cx="724" cy="292" r="8" />

  <rect class="note" x="752" y="88" width="154" height="82" rx="8" />
  <circle class="pareto" cx="774" cy="114" r="6" />
  <text class="small" x="790" y="119">Pareto point</text>
  <circle class="dominated" cx="774" cy="146" r="6" />
  <text class="small" x="790" y="151">Dominated run</text>

  <text class="small" x="466" y="272">Pareto curve</text>
  <path d="M558 266 C580 258, 594 252, 618 250" fill="none" stroke="#76b900" stroke-width="1.8" marker-end="url(#axis-arrow)" />
</svg>
