name: cuvs_ivf_sq
constraints:
  search: cuvs_bench.config.algos.constraints.cuvs_ivf_sq_search
groups:
  base:
    build:
      nlist: [1024, 2048, 4096, 8192]
      ratio: [1, 2]
      niter: [25]
    search:
      nprobe: [1, 5, 10, 20, 50, 100, 200, 500]
  large:
    build:
      nlist: [8192, 16384, 32000, 64000]
      ratio: [2, 4]
      niter: [20]
    search:
      nprobe: [10, 20, 50, 100, 200, 500, 1000, 2000]
  test:
    build:
      nlist: [1024]
      ratio: [1]
      niter: [20]
    search:
      nprobe: [1, 5]
