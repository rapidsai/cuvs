name: faiss_cpu_ivf_sq
constraints:
  search: cuvs_bench.config.algos.constraints.faiss_cpu_ivf_sq_search
groups:
  base:
    build:
      nlist: [1024, 2048, 4096]
      ratio: [2, 4]
      quantizer_type: [int8]
    search:
      nprobe: [1, 5, 10, 20, 50, 100, 200]
      refine_ratio: [1]
  large:
    build:
      nlist: [8192, 16384, 32768]
      ratio: [4]
      quantizer_type: [int8]
    search:
      nprobe: [10, 20, 50, 100, 200, 500, 1000]
      refine_ratio: [1, 2]
  test:
    build:
      nlist: [1024]
      ratio: [2]
      quantizer_type: [int8]
    search:
      nprobe: [1, 5]
      refine_ratio: [1]
