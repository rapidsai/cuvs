# OpenSearch k-NN benchmark configuration – nmslib HNSW engine
#
# The nmslib engine implements HNSW and is the default k-NN backend in
# OpenSearch.  Build parameters control graph connectivity and construction
# quality; search parameters control the ef_search sweep used at query time.
#
# Build parameters
# ----------------
# m                Number of bidirectional graph edges per node (higher = better
#                  recall, larger index, slower build).  Analogous to M in hnswlib.
# ef_construction  Size of the candidate list during graph construction (higher =
#                  better recall, slower build).
#
# Search parameters
# -----------------
# ef_search        Size of the candidate list at query time.  Updated between
#                  search-parameter sweeps via index settings.  Higher values
#                  improve recall at the cost of latency.

name: opensearch_hnsw
groups:
  base:
    build:
      m: [16, 32, 64]
      ef_construction: [100, 200, 512]
    search:
      ef_search: [50, 100, 200, 512, 1024]

  large:
    build:
      m: [32, 64]
      ef_construction: [200, 512]
    search:
      ef_search: [100, 200, 512, 1024]

  test:
    build:
      m: [16]
      ef_construction: [100]
    search:
      ef_search: [50, 100]
