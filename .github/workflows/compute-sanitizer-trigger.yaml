name: Compute Sanitizer Trigger

# This workflow runs all compute-sanitizer tools on all libcuvs tests weekly.
# WARNING: This is very resource intensive and runs many GPU jobs.
# For targeted testing, manually trigger compute-sanitizer-run.yaml with specific tool_name and test_names.

on:
  schedule:
    - cron: '0 10 * * 6'  # Weekly on Saturday at 10:00 UTC
  workflow_dispatch:

jobs:
  discover-sanitizer-tests:
    runs-on: linux-amd64-cpu4
    container:
      image: rapidsai/ci-conda:26.04-latest
    outputs:
      memcheck_tests: ${{ steps.find-tests.outputs.memcheck_tests }}
      racecheck_tests: ${{ steps.find-tests.outputs.racecheck_tests }}
      synccheck_tests: ${{ steps.find-tests.outputs.synccheck_tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Discover test executables
        id: find-tests
        shell: bash
        run: |
          ./ci/discover_libcuvs_tests.sh
  run-sanitizer-tests-memcheck:
    name: compute-sanitizer memcheck tests
    needs: discover-sanitizer-tests
    uses: ./.github/workflows/compute-sanitizer-run.yaml
    with:
      tool_name: "memcheck"
      test_names: ${{ needs.discover-sanitizer-tests.outputs.memcheck_tests }}
  run-sanitizer-tests-racecheck:
    name: compute-sanitizer racecheck tests
    needs: discover-sanitizer-tests
    uses: ./.github/workflows/compute-sanitizer-run.yaml
    with:
      tool_name: "racecheck"
      test_names: ${{ needs.discover-sanitizer-tests.outputs.racecheck_tests }}
  run-sanitizer-tests-synccheck:
    name: compute-sanitizer synccheck tests
    needs: discover-sanitizer-tests
    uses: ./.github/workflows/compute-sanitizer-run.yaml
    with:
      tool_name: "synccheck"
      test_names: ${{ needs.discover-sanitizer-tests.outputs.synccheck_tests }}
