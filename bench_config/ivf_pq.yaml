name: cuvs_ivf_pq
constraints:
  build: cuvs_bench.config.algos.constraints.cuvs_ivf_pq_build
  search: cuvs_bench.config.algos.constraints.cuvs_ivf_pq_search
groups:
  openai:
    build:
      nlist: [1000, 2000, 4096]
      pq_dim: [192, 256, 384, 512, 768]
      pq_bits: [4, 6, 8]
