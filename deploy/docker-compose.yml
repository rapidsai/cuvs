# OpenSearch GPU Remote Index Build — Docker Compose Demo
#
# Architecture:
#   minio              S3-compatible object store used to exchange vector data
#   minio-init         One-shot container that creates the MinIO bucket
#   opensearch         OpenSearch node with kNN plugin (requires 2.17+)
#   remote-index-builder  GPU-accelerated Faiss index builder (FastAPI service)
#   bench              Registers repo + cluster settings, runs cuvs-bench build/search
#
# Requirements:
#   - NVIDIA GPU with CUDA support
#   - NVIDIA Container Toolkit  https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#   - Docker Compose v2
#   - vm.max_map_count >= 262144 on the host:
#       sudo sysctl -w vm.max_map_count=262144
#
# Usage:
#   docker compose up --build
#
# Data flow:
#   OpenSearch flushes a segment  →  uploads vectors + doc-IDs to MinIO
#   OpenSearch POSTs /_build to the remote-index-builder with the S3 paths
#   remote-index-builder downloads from MinIO, builds index on GPU, uploads result
#   OpenSearch downloads the finished index from MinIO and merges it into the shard

services:

  # ── Object Store ────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/opensearch-vectors &&
        echo 'Bucket opensearch-vectors ready'
      "
    restart: "no"

  # ── OpenSearch ───────────────────────────────────────────────────────────────
  opensearch:
    build:
      context: ./opensearch
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g
    # Bypass the Docker entrypoint script — all config lives in opensearch.yml.
    # Keystore credentials are baked into the image (see opensearch/Dockerfile).
    command: ["/usr/share/opensearch/bin/opensearch"]
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      # Mounts S3 client config (endpoint, protocol, path_style_access).
      # These are client-level settings and cannot be set in the snapshot API.
      - ./opensearch/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
    ports:
      - "9200:9200"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      # wait_for_status=yellow blocks until the cluster is at least yellow
      test: ["CMD-SHELL", "curl -sf 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── GPU Index Builder ────────────────────────────────────────────────────────
  remote-index-builder:
    image: opensearchproject/remote-vector-index-builder:api-latest
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=us-east-1
      # Route S3 calls to MinIO instead of AWS (requires boto3 >= 1.28)
      - AWS_ENDPOINT_URL=http://minio:9000
    ports:
      - "1025:1025"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; socket.create_connection((\"localhost\", 1025), 2).close()'"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    restart: on-failure
    # GPU device reservation
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Benchmark ────────────────────────────────────────────────────────────────
  # Required environment variables (set in shell or a .env file):
  #   DATASET_PATH  Absolute path to the directory containing dataset files
  #                 e.g. export DATASET_PATH=/data/ann-benchmarks
  # Optional:
  #   DATASET       Dataset name (default: sift-128-euclidean)
  #   BENCH_GROUPS  Parameter sweep group: test | base | large (default: test)
  #   K             Number of neighbors to search for (default: 10)
  bench:
    build:
      context: ./bench
    depends_on:
      opensearch:
        condition: service_healthy
      remote-index-builder:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - BUILDER_URL=http://remote-index-builder:1025
      - MINIO_URL=http://minio:9000
      - DATASET=${DATASET:-sift-128-euclidean}
      - DATASET_PATH=/data/datasets
      - BENCH_GROUPS=${BENCH_GROUPS:-test}
      - K=${K:-10}
    volumes:
      - ${DATASET_PATH:?DATASET_PATH must be set to the directory containing dataset files}:/data/datasets
    restart: "no"

volumes:
  minio-data:
  opensearch-data:
